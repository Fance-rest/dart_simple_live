name: app-tv-build-action-release
# 手动触发（已改为自动生成签名密钥，无需用户提供 keystore / TOKEN）
on:
  workflow_dispatch:
jobs:
  build-tv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: "17"
          cache: "gradle"

      - name: Generate Android keystore
        run: |
          cd simple_live_tv_app
          KS="$GITHUB_WORKSPACE/simple_live_tv_app/android/keystore.jks"
          keytool -genkeypair -alias tvkey -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore "$KS" -storepass android -keypass android \
            -dname "CN=SliveTV, OU=Build, O=Slive, L=CN, ST=CN, C=CN"
          echo "storeFile=$KS" > android/key.properties
          echo "storePassword=android" >> android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "keyAlias=tvkey" >> android/key.properties

      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: simple_live_tv_app/pubspec.yaml
          cache: true

      - name: Restore packages
        run: |
          cd simple_live_tv_app
          flutter pub get

      - name: Build APK
        run: |
          cd simple_live_tv_app
          flutter build apk --release --split-per-abi

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: android_tv
          path: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Read version
        id: version
        uses: juliangruber/read-file-action@v1
        with:
          path: assets/tv_app_version.json
      - name: Echo version
        run: echo "${{ fromJson(steps.version.outputs.content).version }}"
      - name: Echo version content
        run: echo "${{ fromJson(steps.version.outputs.content).version_desc }}"

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ fromJson(steps.version.outputs.content).version }}"
          body: "# Android TV \n${{ fromJson(steps.version.outputs.content).version_desc }}"
          prerelease: ${{ fromJson(steps.version.outputs.content).prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
